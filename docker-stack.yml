version: "3.8"

# ============================================
# ADAKAL GROUP - Odoo 18 Docker Swarm Stack
# ============================================
# Architecture Haute Disponibilité :
#   - etcd        : 3 instances (DCS pour Patroni)
#   - PostgreSQL  : 3 instances via Patroni (1 primary + 2 replicas)
#   - Odoo        : 1 instance failover (n'importe quel nœud)
#   - Filestore   : S3 compatible (via module OCA)
# ============================================
# Les mots de passe sont gérés via Docker Secrets.
# Exécutez create-secrets.sh avant le premier déploiement.
# ============================================

services:

  # ============================================
  # etcd - Distributed Configuration Store
  # ============================================
  # etcd est le "cerveau" de Patroni : il gère
  # l'élection du primary PostgreSQL et le consensus.
  # Chaque nœud Swarm a une instance etcd.
  # ============================================
  etcd1:
    image: quay.io/coreos/etcd:v3.5.21
    hostname: etcd1
    command:
      - etcd
      - --name=etcd1
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd1:2379
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=adakal-etcd-cluster
      - --data-dir=/etcd-data
    volumes:
      - etcd1-data:/etcd-data
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.node == 1
      restart_policy:
        condition: on-failure
        delay: 5s

  etcd2:
    image: quay.io/coreos/etcd:v3.5.21
    hostname: etcd2
    command:
      - etcd
      - --name=etcd2
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd2:2379
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=adakal-etcd-cluster
      - --data-dir=/etcd-data
    volumes:
      - etcd2-data:/etcd-data
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.node == 2
      restart_policy:
        condition: on-failure
        delay: 5s

  etcd3:
    image: quay.io/coreos/etcd:v3.5.21
    hostname: etcd3
    command:
      - etcd
      - --name=etcd3
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd3:2379
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=adakal-etcd-cluster
      - --data-dir=/etcd-data
    volumes:
      - etcd3-data:/etcd-data
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.node == 3
      restart_policy:
        condition: on-failure
        delay: 5s

  # ============================================
  # PostgreSQL + Patroni (nœud 1 - préféré primary)
  # ============================================
  patroni1:
    image: ghcr.io/abocoum/adakal-patroni:1.1.3
    hostname: patroni1
    environment:
      PATRONI_NAME: patroni1
      PATRONI_SCOPE: adakal-pg
      PATRONI_ETCD3_HOST1: etcd1:2379
      PATRONI_ETCD3_HOST2: etcd2:2379
      PATRONI_ETCD3_HOST3: etcd3:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni1:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni1:5432
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data/pgdata
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_REPLICATION_USERNAME: replicator
      POSTGRES_USER: odoo
    secrets:
      - postgres_password
      - patroni_superuser_password
      - patroni_replication_password
    volumes:
      - patroni1-data:/var/lib/postgresql/data
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.node == 1
      restart_policy:
        condition: on-failure
        delay: 10s

  patroni2:
    image: ghcr.io/abocoum/adakal-patroni:1.1.3
    hostname: patroni2
    environment:
      PATRONI_NAME: patroni2
      PATRONI_SCOPE: adakal-pg
      PATRONI_ETCD3_HOST1: etcd1:2379
      PATRONI_ETCD3_HOST2: etcd2:2379
      PATRONI_ETCD3_HOST3: etcd3:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni2:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni2:5432
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data/pgdata
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_REPLICATION_USERNAME: replicator
      POSTGRES_USER: odoo
    secrets:
      - postgres_password
      - patroni_superuser_password
      - patroni_replication_password
    volumes:
      - patroni2-data:/var/lib/postgresql/data
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.node == 2
      restart_policy:
        condition: on-failure
        delay: 10s

  patroni3:
    image: ghcr.io/abocoum/adakal-patroni:1.1.3
    hostname: patroni3
    environment:
      PATRONI_NAME: patroni3
      PATRONI_SCOPE: adakal-pg
      PATRONI_ETCD3_HOST1: etcd1:2379
      PATRONI_ETCD3_HOST2: etcd2:2379
      PATRONI_ETCD3_HOST3: etcd3:2379
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni3:8008
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni3:5432
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data/pgdata
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_REPLICATION_USERNAME: replicator
      POSTGRES_USER: odoo
    secrets:
      - postgres_password
      - patroni_superuser_password
      - patroni_replication_password
    volumes:
      - patroni3-data:/var/lib/postgresql/data
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.node == 3
      restart_policy:
        condition: on-failure
        delay: 10s

  # ============================================
  # HAProxy - Routage automatique vers le primary PG
  # ============================================
  # HAProxy interroge l'API Patroni pour trouver
  # le primary et route Odoo vers celui-ci.
  # ============================================
  haproxy:
    image: haproxy:2.9-alpine
    hostname: haproxy
    configs:
      - source: haproxy-cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    ports:
      - "127.0.0.1:5432:5432"
      - "127.0.0.1:7000:7000"
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ============================================
  # Odoo 18 Community - Failover
  # ============================================
  odoo:
    image: ghcr.io/abocoum/adakal-odoo:1.1.3
    environment:
      # Connexion via HAProxy (non-secret)
      HOST: haproxy
      PORT: 5432
      USER: odoo
      # S3 endpoint (non-secret)
      AWS_HOST: ${S3_ENDPOINT:-}
    secrets:
      - postgres_password
      - odoo_admin_passwd
      - s3_access_key
      - s3_secret_key
    configs:
      - source: odoo-conf
        target: /etc/odoo/odoo.conf
    volumes:
      - odoo-web-data:/var/lib/odoo
      - odoo-extra-addons:/mnt/extra-addons
      - odoo-oca-addons:/mnt/oca-addons:ro
    ports:
      - target: 8069
        published: 8069
        protocol: tcp
        mode: ingress
      - target: 8072
        published: 8072
        protocol: tcp
        mode: ingress
    networks:
      - odoo-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

configs:
  haproxy-cfg:
    external: true
  odoo-conf:
    external: true

secrets:
  postgres_password:
    external: true
  patroni_superuser_password:
    external: true
  patroni_replication_password:
    external: true
  odoo_admin_passwd:
    external: true
  s3_access_key:
    external: true
  s3_secret_key:
    external: true

volumes:
  etcd1-data:
  etcd2-data:
  etcd3-data:
  patroni1-data:
  patroni2-data:
  patroni3-data:
  odoo-web-data:
  odoo-extra-addons:
  odoo-oca-addons:

networks:
  odoo-internal:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

global
    maxconn 1000
    log stdout format raw local0

defaults
    mode tcp
    log global
    retries 3
    timeout connect 10s
    timeout client 30m
    timeout server 30m
    timeout check 5s

# ============================================
# Stats - Interface de monitoring
# ============================================
# Accessible sur http://<MANAGER_IP>:7000/
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 10s
    stats show-legends

# ============================================
# PostgreSQL Primary (lecture/écriture)
# ============================================
# HAProxy interroge l'API REST Patroni (port 8008)
# pour déterminer quel nœud est le primary.
# Seul le primary répond HTTP 200 sur /primary
listen postgresql-primary
    bind *:5432
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 200 on-marked-down shutdown-sessions

    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ============================================
# PostgreSQL Replicas (lecture seule - optionnel)
# ============================================
# Utile si vous ajoutez plus tard un read-replica
# pour les rapports lourds.
listen postgresql-replicas
    bind *:5433
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 200

    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

[options]
; ============================================
; ADAKAL GROUP - Configuration Odoo 18
; ============================================

; --- Connexion base de données ---
; En mode Swarm+Patroni, Odoo se connecte via HAProxy
; qui route automatiquement vers le primary PostgreSQL
; db_host, db_port, db_user, db_password are set via
; environment variables (HOST, PORT, USER, PASSWORD)
; by the official Odoo entrypoint
db_name = False
db_template = template0
db_maxconn = 64
db_sslmode = prefer

; --- Chemins ---
addons_path = /mnt/extra-addons,/mnt/oca-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; --- Réseau ---
http_port = 8069
longpolling_port = 8072
proxy_mode = True
xmlrpc_interface = 0.0.0.0
netrpc_interface = 0.0.0.0

; --- Sécurité ---
; IMPORTANT : Changez cette clé avant le premier lancement !
; admin_passwd is set via ODOO_ADMIN_PASSWD env var
list_db = True
dbfilter = ^%d$

; --- Performance ---
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1
limit_request = 8192

; --- Logs ---
logfile = /var/lib/odoo/odoo-server.log
log_level = info
log_handler = :INFO
logrotate = True

; --- Email (à configurer selon votre serveur SMTP) ---
; smtp_server = smtp.example.com
; smtp_port = 587
; smtp_ssl = True
; smtp_user = noreply@adakalgroup.com
; smtp_password = votre_mot_de_passe_smtp

; --- Stockage S3 (via module OCA fs_attachment_s3) ---
; La configuration S3 se fait via l'interface Odoo après installation
; du module fs_attachment_s3 (Settings > Technical > Storage Backends)
; Les credentials S3 sont passés via les variables d'environnement
; AWS_ACCESS_KEY_ID et AWS_SECRET_ACCESS_KEY dans docker-compose.yml

; --- Divers ---
without_demo = all
server_wide_modules = base,web
